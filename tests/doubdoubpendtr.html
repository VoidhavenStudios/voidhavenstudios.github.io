<!DOCTYPE html><html><head><style>body{margin:0;overflow:hidden;background:#000}canvas{position:absolute}</style></head><body><canvas id="t"></canvas><canvas id="c"></canvas><script>const t=document.getElementById("t"),c=document.getElementById("c"),tx=t.getContext("2d"),cx=c.getContext("2d");let W,H,L;function R(){W=t.width=c.width=window.innerWidth;H=t.height=c.height=window.innerHeight;L=Math.min(W,H)/8;}window.onresize=R;const N=2,G=9.81,dt=0.015;R();const st1=new Float64Array(4),st2=new Float64Array(4),k1=new Float64Array(4),k2=new Float64Array(4),k3=new Float64Array(4),k4=new Float64Array(4),tm=new Float64Array(4);st1[0]=Math.PI+1e-5;st1[1]=Math.PI;st2[0]=Math.PI;st2[1]=Math.PI+1e-5;function f(s,d){let t0=s[0],t1=s[1],w0=s[2],w1=s[3],dth=t0-t1,co=Math.cos(dth),sn=Math.sin(dth);d[0]=w0;d[1]=w1;let b0=-w1*w1*sn-2*G*Math.sin(t0),b1=w0*w0*sn-G*Math.sin(t1),det=2-co*co;d[2]=(b0-co*b1)/det;d[3]=(2*b1-co*b0)/det;}function U(st){f(st,k1);for(let i=0;i<4;i++)tm[i]=st[i]+0.5*dt*k1[i];f(tm,k2);for(let i=0;i<4;i++)tm[i]=st[i]+0.5*dt*k2[i];f(tm,k3);for(let i=0;i<4;i++)tm[i]=st[i]+dt*k3[i];f(tm,k4);for(let i=0;i<4;i++)st[i]+=(dt/6)*(k1[i]+2*k2[i]+2*k3[i]+k4[i]);}tx.strokeStyle="rgba(255,255,255,0.7)";tx.lineWidth=2;let px1=0,py1=0,px2=0,py2=0;function Z(){cx.clearRect(0,0,W,H);U(st1);U(st2);cx.strokeStyle="#fff";cx.lineWidth=3;cx.beginPath();let x1=W/2,y1=H/2;cx.moveTo(x1,y1);x1+=L*Math.sin(st1[0]);y1+=L*Math.cos(st1[0]);cx.lineTo(x1,y1);let x1e=x1+L*Math.sin(st1[1]),y1e=y1+L*Math.cos(st1[1]);cx.lineTo(x1e,y1e);let x2=x1e,y2=y1e;cx.moveTo(x2,y2);x2+=L*Math.sin(st2[0]);y2+=L*Math.cos(st2[0]);cx.lineTo(x2,y2);let x2e=x2+L*Math.sin(st2[1]),y2e=y2+L*Math.cos(st2[1]);cx.lineTo(x2e,y2e);cx.stroke();if(px1){tx.beginPath();tx.moveTo(px1,py1);tx.lineTo(x1e,y1e);tx.stroke();}if(px2){tx.beginPath();tx.moveTo(px2,py2);tx.lineTo(x2e,y2e);tx.stroke();}px1=x1e;py1=y1e;px2=x2e;py2=y2e;requestAnimationFrame(Z);}Z();</script></body></html>
