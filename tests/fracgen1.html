<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rhalza's Fractal Gen v1.3.92</title>
<style>
body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: monospace; user-select: none; -webkit-user-select: none; }
canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
#ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10; flex-wrap: wrap; justify-content: center; width: 95%; }
.btn { background: rgba(0, 255, 150, 0.05); border: 1px solid rgba(0, 255, 150, 0.4); color: #0f9; padding: 10px 14px; font-family: monospace; font-size: 13px; cursor: pointer; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 0 10px rgba(0, 255, 150, 0.1); backdrop-filter: blur(5px); }
.btn:hover { background: rgba(0, 255, 150, 0.2); box-shadow: 0 0 15px rgba(0, 255, 150, 0.4); }
.btn:active { background: rgba(0, 255, 150, 0.4); box-shadow: 0 0 25px rgba(0, 255, 150, 0.8); }
#formula-display { position: absolute; top: 20px; left: 20px; right: 20px; color: #fff; font-size: 14px; pointer-events: none; text-shadow: 0 0 5px #0f9, 0 0 10px #00f; z-index: 10; text-align: center; word-wrap: break-word; line-height: 1.5; max-height: 80px; overflow-y: auto; }
#stats-display { position: absolute; top: 100px; left: 20px; right: 20px; color: #0ff; font-size: 12px; pointer-events: none; text-shadow: 0 0 5px #0ff; z-index: 10; text-align: center; line-height: 1.6; }
#grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border: 2px solid transparent; z-index: 5; display: none; }
.grid-mode #grid-overlay { display: block; background: linear-gradient(90deg, transparent calc(50% - 1px), #0f9 50%, transparent calc(50% + 1px)), linear-gradient(180deg, transparent calc(50% - 1px), #0f9 50%, transparent calc(50% + 1px)); opacity: 0.15; }
#prompt { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 24px; letter-spacing: 3px; text-shadow: 0 0 15px #0f9; pointer-events: none; z-index: 20; display: none; text-align: center; }
.grid-mode #prompt { display: block; }
#modal-bg { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
.modal-content { background: #050505; padding: 20px; border: 1px solid #0f9; border-radius: 8px; text-align: center; width: 90%; max-width: 500px; box-shadow: 0 0 30px rgba(0,255,150,0.2); }
textarea { width: 100%; height: 200px; background: #000; color: #0f9; border: 1px solid #0f9; font-family: monospace; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 15px; border-radius: 4px; }
textarea:focus { outline: none; box-shadow: 0 0 10px rgba(0,255,150,0.4); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #0f9; border-radius: 3px; }
</style>
</head>
<body>
<div id="formula-display"></div>
<div id="stats-display"></div>
<div id="grid-overlay"></div>
<div id="prompt">SELECT EVOLUTION</div>
<div id="modal-bg">
    <div class="modal-content">
        <h3 style="color:#0f9; margin-top:0; letter-spacing:2px;">DNA SEQUENCE</h3>
        <textarea id="dna-text" spellcheck="false"></textarea>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <button class="btn" id="btn-load-dna">Inject</button>
            <button class="btn" id="btn-save-txt">Save</button>
            <button class="btn" id="btn-close-modal" style="border-color:#f55; color:#f55;">Close</button>
        </div>
    </div>
</div>
<div id="ui">
<button class="btn" id="btn-evolve">Evolve</button>
<button class="btn" id="btn-random">Random</button>
<button class="btn" id="btn-dna">DNA</button>
<button class="btn" id="btn-res">Res: 100%</button>
</div>
<canvas id="glcanvas"></canvas>
<script>
const canvas = document.getElementById('glcanvas');
const gl = canvas.getContext('webgl2', { antialias: false, depth: false, preserveDrawingBuffer: true });
if (!gl) document.body.innerHTML = '<h1 style="color:#f00;text-align:center;margin-top:20%">WebGL2 Required</h1>';

gl.getExtension('EXT_color_buffer_float');
gl.getExtension('EXT_color_buffer_half_float');

let w, h;
let resScale = 1.0;
let accumTex = gl.createTexture();
let accumFbo = gl.createFramebuffer();
let frameCount = 0;
let isMoving = false;

function resize() {
    w = Math.floor(window.innerWidth * resScale);
    h = Math.floor(window.innerHeight * resScale);
    canvas.width = w; 
    canvas.height = h;
    gl.bindTexture(gl.TEXTURE_2D, accumTex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.bindFramebuffer(gl.FRAMEBUFFER, accumFbo);

    const formats =[
        { internal: gl.RGBA32F, format: gl.RGBA, type: gl.FLOAT },
        { internal: gl.RGBA16F, format: gl.RGBA, type: gl.HALF_FLOAT },
        { internal: gl.RGBA8, format: gl.RGBA, type: gl.UNSIGNED_BYTE }
    ];

    for (let f of formats) {
        gl.texImage2D(gl.TEXTURE_2D, 0, f.internal, w, h, 0, f.format, f.type, null);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, accumTex, 0);
        if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE) break;
    }

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    frameCount = 0;
}
window.addEventListener('resize', resize);
resize();

const vsSource = `#version 300 es
in vec2 position;
out vec2 vUv;
void main() {
    vUv = position * 0.5 + 0.5;
    gl_Position = vec4(position, 0.0, 1.0);
}`;

const fsBase = `#version 300 es
precision highp float;
precision highp int;

in vec2 vUv;
out vec4 fragColor;

uniform vec2 u_res;
uniform vec2 u_offset_x;
uniform vec2 u_offset_y;
uniform vec2 u_zoom;
uniform int u_iter;
uniform vec3 u_color;
uniform vec2 u_jitter;
uniform float u_alpha;

vec2 ds_add(vec2 a, vec2 b) {
    vec2 s; float t1 = a.x + b.x; float e = t1 - a.x;
    float t2 = ((b.x - e) + (a.x - (t1 - e))) + a.y + b.y;
    s.x = t1 + t2; s.y = t2 - (s.x - t1); return s;
}
vec2 ds_mul(vec2 a, vec2 b) {
    vec2 s; float c11 = a.x * b.x; float c21 = a.x * b.x - c11;
    float c2 = a.x * b.y + a.y * b.x; float t1 = c11 + c2; float e = t1 - c11;
    float t2 = ((c2 - e) + (c11 - (t1 - e))) + c21 + a.y * b.y;
    s.x = t1 + t2; s.y = t2 - (s.x - t1); return s;
}
vec2 ds_div(vec2 a, vec2 b) {
    float t1 = a.x / b.x; vec2 ds_t1 = vec2(t1, 0.0);
    vec2 con = ds_mul(ds_t1, b); vec2 rem = ds_add(a, vec2(-con.x, -con.y));
    float t2 = rem.x / b.x; return ds_add(ds_t1, vec2(t2, 0.0));
}
vec4 c_add(vec4 a, vec4 b) { return vec4(ds_add(a.xy, b.xy), ds_add(a.zw, b.zw)); }
vec4 c_sub(vec4 a, vec4 b) { return vec4(ds_add(a.xy, vec2(-b.x, -b.y)), ds_add(a.zw, vec2(-b.z, -b.w))); }
vec4 c_mul(vec4 a, vec4 b) {
    vec2 r = ds_add(ds_mul(a.xy, b.xy), vec2(-1.0, -1.0) * ds_mul(a.zw, b.zw));
    vec2 i = ds_add(ds_mul(a.xy, b.zw), ds_mul(a.zw, b.xy)); return vec4(r, i);
}
vec4 c_sqr(vec4 a) {
    vec2 r = ds_add(ds_mul(a.xy, a.xy), vec2(-1.0, -1.0) * ds_mul(a.zw, a.zw));
    vec2 i = ds_mul(ds_mul(a.xy, a.zw), vec2(2.0, 0.0)); return vec4(r, i);
}
vec4 c_cube(vec4 a) { return c_mul(c_sqr(a), a); }
vec4 c_abs(vec4 a) { return vec4(abs(a.x), a.y, abs(a.z), a.w); }
vec4 c_conj(vec4 a) { return vec4(a.xy, -a.zw); }
vec4 c_rot90(vec4 a) { return vec4(-a.z, -a.w, a.x, a.y); }
vec4 c_div(vec4 a, vec4 b) {
    vec2 den = ds_add(ds_mul(b.xy, b.xy), ds_mul(b.zw, b.zw)); den.x += 1e-15;
    vec2 r = ds_div(ds_add(ds_mul(a.xy, b.xy), ds_mul(a.zw, b.zw)), den);
    vec2 i = ds_div(ds_add(ds_mul(a.zw, b.xy), vec2(-1.0, -1.0) * ds_mul(a.xy, b.zw)), den);
    return vec4(r, i);
}
vec4 c_inv(vec4 a) {
    vec2 den = ds_add(ds_mul(a.xy, a.xy), ds_mul(a.zw, a.zw)); den.x += 1e-15;
    vec2 r = ds_div(a.xy, den); vec2 i = ds_div(vec2(-a.z, -a.w), den);
    return vec4(r, i);
}

vec4 f(vec4 z, vec4 c) { return _MATH_; }

void main() {
    vec2 uv = (vUv - 0.5) + u_jitter / u_res;
    uv *= u_res / min(u_res.x, u_res.y);
    vec2 cx = ds_add(ds_div(vec2(uv.x, 0.0), u_zoom), u_offset_x);
    vec2 cy = ds_add(ds_div(vec2(uv.y, 0.0), u_zoom), u_offset_y);
    vec4 c = vec4(cx.x, cx.y, cy.x, cy.y);
    vec4 z = c; 
    float iter = 0.0; 
    float r2 = 0.0;
    
    for(int i=0; i<5000; i++) {
        if(i >= u_iter) break;
        z = f(z, c); 
        r2 = z.x*z.x + z.z*z.z;
        if(r2 > 256.0) { iter = float(i); break; }
    }
    
    if(r2 <= 256.0) {
        fragColor = vec4(0.0, 0.0, 0.0, u_alpha);
        return;
    }
    
    float sn = iter - log2(log2(clamp(r2, 256.0, 60000.0))) + 4.0;
    vec3 col = 0.5 + 0.5 * cos(3.0 + sn * 0.15 + u_color);
    fragColor = vec4(col, u_alpha);
}`;

const displayFs = `#version 300 es
precision highp float;
in vec2 vUv;
out vec4 fragColor;
uniform sampler2D u_tex;
void main() {
    fragColor = vec4(texture(u_tex, vUv).rgb, 1.0);
}`;

function compile(type, src) {
    let s = gl.createShader(type); 
    gl.shaderSource(s, src); 
    gl.compileShader(s); 
    return s;
}

function createProgram(vsSrc, fsSrc) {
    let p = gl.createProgram();
    let vs = compile(gl.VERTEX_SHADER, vsSrc);
    let fs = compile(gl.FRAGMENT_SHADER, fsSrc);
    if (!vs || !fs) return null;
    gl.attachShader(p, vs);
    gl.attachShader(p, fs);
    gl.bindAttribLocation(p, 0, 'position');
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) return null;
    return p;
}

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const quadBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
gl.bindVertexArray(null);

const displayProg = createProgram(vsSource, displayFs);
const dispTexLoc = gl.getUniformLocation(displayProg, "u_tex");

const _f32 = new Float32Array(1);
function splitDouble(v) { 
    _f32[0] = v; 
    return [_f32[0], v - _f32[0]]; 
}

function ddAdd(a, b) {
    let t1 = a[0] + b[0];
    let e = t1 - a[0];
    let t2 = ((b[0] - e) + (a[0] - (t1 - e))) + a[1] + b[1];
    let hi = t1 + t2;
    let lo = t2 - (hi - t1);
    return [hi, lo];
}

function ff(v) { 
    let s = v.toString(); 
    return (s.includes('.') || s.includes('e')) ? s : s + '.0'; 
}

const vars = ['z', 'c'];
const op1 =['c_sqr', 'c_cube', 'c_abs', 'c_conj', 'c_inv', 'c_rot90'];
const op1_math =['(%s)²', '(%s)³', '|%s|', 'conj(%s)', '1/(%s)', 'i*(%s)'];
const op2 =['c_add', 'c_sub', 'c_mul', 'c_div'];
const op2_math =['(%s + %s)', '(%s - %s)', '(%s * %s)', '(%s / %s)'];

function randRange(min, max) { return Math.random() * (max - min) + min; }
function randArr(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function buildNode(depth) {
    if (depth <= 0 || Math.random() < 0.15) {
        if (Math.random() < 0.25) return { type: 'const', val:[randRange(-1.5, 1.5), randRange(-1.5, 1.5)] };
        return { type: 'var', val: randArr(vars) };
    }
    if (Math.random() < 0.4) {
        let o = Math.floor(Math.random() * op1.length);
        return { type: 'op1', op: op1[o], math: op1_math[o], arg: buildNode(depth - 1) };
    } else {
        let o = Math.floor(Math.random() * op2.length);
        return { type: 'op2', op: op2[o], math: op2_math[o], left: buildNode(depth - 1), right: buildNode(depth - 1) };
    }
}

const fallbackAST = { type: 'op2', op: 'c_add', math: '(%s + %s)', left: { type: 'op1', op: 'c_sqr', math: '(%s)²', arg: { type: 'var', val: 'z' } }, right: { type: 'var', val: 'c' } };
function genBaseTree() { return { type: 'op2', op: 'c_add', math: '(%s + %s)', left: buildNode(3), right: { type: 'var', val: 'c' } }; }

function cloneNode(n) {
    if (n.type === 'var' || n.type === 'const') return { ...n };
    if (n.type === 'op1') return { ...n, arg: cloneNode(n.arg) };
    return { ...n, left: cloneNode(n.left), right: cloneNode(n.right) };
}

function mutateNode(n, depth) {
    if (Math.random() < 0.2 || depth <= 0) return buildNode(2);
    let c = cloneNode(n);
    if (c.type === 'op1') c.arg = mutateNode(c.arg, depth - 1);
    else if (c.type === 'op2') {
        if (Math.random() < 0.5) c.left = mutateNode(c.left, depth - 1);
        else c.right = mutateNode(c.right, depth - 1);
    }
    return c;
}

function astToGLSL(n) {
    if (n.type === 'var') return n.val;
    if (n.type === 'const') {
        let x = splitDouble(n.val[0]), y = splitDouble(n.val[1]);
        return `vec4(${ff(x[0])}, ${ff(x[1])}, ${ff(y[0])}, ${ff(y[1])})`;
    }
    if (n.type === 'op1') return `${n.op}(${astToGLSL(n.arg)})`;
    if (n.type === 'op2') return `${n.op}(${astToGLSL(n.left)}, ${astToGLSL(n.right)})`;
}

function astToMath(n) {
    if (n.type === 'var') return n.val;
    if (n.type === 'const') return `${n.val[0].toFixed(3)}${n.val[1]>=0?'+':''}${n.val[1].toFixed(3)}i`;
    if (n.type === 'op1') return n.math.replace('%s', astToMath(n.arg));
    if (n.type === 'op2') return n.math.replace('%s', astToMath(n.left)).replace('%s', astToMath(n.right));
}

function createFractal(ast) {
    let glsl = astToGLSL(ast);
    let p = createProgram(vsSource, fsBase.replace('_MATH_', glsl));
    if (!p) return null;
    return {
        ast: ast, prog: p, zoom: 0.5, offset: [[0, 0],[0, 0]], color:[randRange(0, 6), randRange(0, 6), randRange(0, 6)],
        locs: {
            res: gl.getUniformLocation(p, 'u_res'), off_x: gl.getUniformLocation(p, 'u_offset_x'), off_y: gl.getUniformLocation(p, 'u_offset_y'),
            zm: gl.getUniformLocation(p, 'u_zoom'), iter: gl.getUniformLocation(p, 'u_iter'),
            col: gl.getUniformLocation(p, 'u_color'), jitter: gl.getUniformLocation(p, 'u_jitter'), alpha: gl.getUniformLocation(p, 'u_alpha')
        }
    };
}

function getValidFractal(astFunc) {
    for(let i=0; i<20; i++){ let f = createFractal(astFunc()); if(f) return f; }
    return createFractal(fallbackAST);
}

function destroyFractal(f) { if(f && f.prog) gl.deleteProgram(f.prog); }

let mode = 'FULL';
let currentF = getValidFractal(genBaseTree);
let gridF =[];
const display = document.getElementById('formula-display');
const statsDisplay = document.getElementById('stats-display');
const resBtn = document.getElementById('btn-res');
const modalBg = document.getElementById('modal-bg');
const dnaText = document.getElementById('dna-text');

function updateFormula() { 
    display.innerText = 'z = ' + astToMath(currentF.ast); 
}
updateFormula();

function setMode(m) {
    mode = m; 
    document.body.className = m === 'GRID' ? 'grid-mode' : ''; 
    frameCount = 0;
}

document.getElementById('btn-evolve').addEventListener('click', () => {
    if(mode === 'GRID') return;
    gridF =[getValidFractal(() => currentF.ast), getValidFractal(() => mutateNode(currentF.ast, 2)), getValidFractal(() => mutateNode(currentF.ast, 2)), getValidFractal(() => mutateNode(currentF.ast, 2))];
    setMode('GRID');
});

document.getElementById('btn-random').addEventListener('click', () => {
    if(mode === 'GRID') return;
    gridF =[getValidFractal(genBaseTree), getValidFractal(genBaseTree), getValidFractal(genBaseTree), getValidFractal(genBaseTree)];
    setMode('GRID');
});

document.getElementById('btn-dna').addEventListener('click', () => {
    dnaText.value = JSON.stringify(currentF.ast, null, 2);
    modalBg.style.display = 'flex';
});

document.getElementById('btn-close-modal').addEventListener('click', () => {
    modalBg.style.display = 'none';
});

document.getElementById('btn-load-dna').addEventListener('click', () => {
    try {
        let parsedAST = JSON.parse(dnaText.value);
        let newF = getValidFractal(() => parsedAST);
        if(newF) {
            destroyFractal(currentF); 
            currentF = newF; 
            updateFormula(); 
            frameCount = 0; 
            modalBg.style.display = 'none';
        }
    } catch (err) {}
});

document.getElementById('btn-save-txt').addEventListener('click', () => {
    const blob = new Blob([dnaText.value], {type: 'text/plain'});
    const a = document.createElement('a'); 
    a.href = URL.createObjectURL(blob); 
    a.download = 'dna.txt'; 
    a.click();
});

document.getElementById('btn-res').addEventListener('click', () => {
    if(resScale === 1.0) { resScale = 0.5; resBtn.innerText = "Res: 50%"; }
    else if(resScale === 0.5) { resScale = 0.25; resBtn.innerText = "Res: 25%"; }
    else { resScale = 1.0; resBtn.innerText = "Res: 100%"; }
    resize();
});

let touches =[]; 
let lastDist = 0; 
let lastPan = null;

window.addEventListener('touchstart', e => {
    if(e.target.closest('#modal-bg') || e.target.closest('.btn')) return;
    e.preventDefault(); 
    frameCount = 0; 
    isMoving = true;
    for (let i = 0; i < e.changedTouches.length; i++) touches.push({ id: e.changedTouches[i].identifier, x: e.changedTouches[i].clientX, y: e.changedTouches[i].clientY });
    if(touches.length === 1) lastPan = { x: touches[0].x, y: touches[0].y };
    else if(touches.length === 2) lastDist = Math.hypot(touches[0].x - touches[1].x, touches[0].y - touches[1].y);
}, {passive: false});

window.addEventListener('touchmove', e => {
    if(e.target.closest('#modal-bg') || e.target.closest('.btn')) return;
    e.preventDefault(); 
    frameCount = 0; 
    isMoving = true;
    for (let i = 0; i < e.changedTouches.length; i++) {
        let t = touches.find(t => t.id === e.changedTouches[i].identifier);
        if (t) { t.x = e.changedTouches[i].clientX; t.y = e.changedTouches[i].clientY; }
    }
    if (mode === 'FULL') {
        if (touches.length === 1 && lastPan) {
            let dx = touches[0].x - lastPan.x; 
            let dy = touches[0].y - lastPan.y;
            currentF.offset[0] = ddAdd(currentF.offset[0], splitDouble(-dx / currentF.zoom / Math.min(w,h) / resScale));
            currentF.offset[1] = ddAdd(currentF.offset[1], splitDouble(dy / currentF.zoom / Math.min(w,h) / resScale));
            lastPan = { x: touches[0].x, y: touches[0].y };
        } else if (touches.length === 2) {
            let d = Math.hypot(touches[0].x - touches[1].x, touches[0].y - touches[1].y);
            if (lastDist > 0) {
                currentF.zoom *= (d / lastDist);
                currentF.zoom = Math.min(currentF.zoom, 1e36);
            }
            lastDist = d;
        }
    }
}, {passive: false});

window.addEventListener('touchend', e => {
    if(e.target.closest('#modal-bg') || e.target.closest('.btn')) return;
    e.preventDefault(); 
    isMoving = false;
    if (mode === 'GRID' && touches.length > 0) {
        let tx = touches[0].x; let ty = touches[0].y; 
        let idx = (tx > window.innerWidth / 2 ? 1 : 0) + (ty > window.innerHeight / 2 ? 2 : 0);
        if(gridF[idx]) {
            let nextF = gridF[idx]; 
            gridF.forEach((f, i) => { if (i !== idx) destroyFractal(f); }); 
            destroyFractal(currentF); 
            currentF = nextF; 
            gridF =[]; 
            updateFormula(); 
            setMode('FULL');
        }
    }
    for (let i = 0; i < e.changedTouches.length; i++) touches = touches.filter(t => t.id !== e.changedTouches[i].identifier);
    if(touches.length === 1) lastPan = { x: touches[0].x, y: touches[0].y };
}, {passive: false});

window.addEventListener('mousedown', e => {
    if(e.target.closest('#modal-bg') || e.target.closest('.btn')) return; 
    frameCount = 0; 
    isMoving = true;
    if(mode === 'GRID') {
        let idx = (e.clientX > window.innerWidth / 2 ? 1 : 0) + (e.clientY > window.innerHeight / 2 ? 2 : 0);
        if(gridF[idx]) {
            let nextF = gridF[idx]; 
            gridF.forEach((f, i) => { if (i !== idx) destroyFractal(f); }); 
            destroyFractal(currentF); 
            currentF = nextF; 
            gridF =[]; 
            updateFormula(); 
            setMode('FULL');
        }
    } else { lastPan = { x: e.clientX, y: e.clientY }; }
});

window.addEventListener('mousemove', e => {
    if(e.target.closest('#modal-bg') || e.target.closest('.btn')) return;
    if (mode === 'FULL' && lastPan && e.buttons === 1) {
        frameCount = 0; 
        isMoving = true;
        let dx = e.clientX - lastPan.x; 
        let dy = e.clientY - lastPan.y;
        currentF.offset[0] = ddAdd(currentF.offset[0], splitDouble(-dx / currentF.zoom / Math.min(w,h) / resScale));
        currentF.offset[1] = ddAdd(currentF.offset[1], splitDouble(dy / currentF.zoom / Math.min(w,h) / resScale));
        lastPan = { x: e.clientX, y: e.clientY };
    }
});

window.addEventListener('mouseup', () => { lastPan = null; isMoving = false; });
window.addEventListener('wheel', e => { 
    if(e.target.closest('#modal-bg')) return; 
    if (mode === 'FULL') { 
        frameCount = 0; 
        isMoving = true; 
        currentF.zoom *= Math.pow(0.998, e.deltaY); 
        currentF.zoom = Math.min(currentF.zoom, 1e36);
        setTimeout(() => isMoving = false, 50);
    } 
});

function drawShader(f, alpha, jx, jy, iter) {
    if(!f || !f.prog) return;
    gl.useProgram(f.prog);
    gl.bindVertexArray(vao);
    gl.uniform2f(f.locs.res, w, h);
    gl.uniform2f(f.locs.off_x, f.offset[0][0], f.offset[0][1]);
    gl.uniform2f(f.locs.off_y, f.offset[1][0], f.offset[1][1]);
    let zm = splitDouble(f.zoom);
    gl.uniform2f(f.locs.zm, zm[0], zm[1]);
    gl.uniform3f(f.locs.col, f.color[0], f.color[1], f.color[2]);
    gl.uniform2f(f.locs.jitter, jx, jy);
    gl.uniform1f(f.locs.alpha, alpha);
    gl.uniform1i(f.locs.iter, iter);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function renderLoop() {
    if (mode === 'FULL') {
        if (!isMoving) frameCount++;
        else frameCount = 0;
        
        let alpha = isMoving ? 1.0 : (1.0 / frameCount);
        let jx = (!isMoving && frameCount > 1) ? (Math.random() - 0.5) * 1.5 : 0.0;
        let jy = (!isMoving && frameCount > 1) ? (Math.random() - 0.5) * 1.5 : 0.0;
        let iterLimit = isMoving ? 100 : Math.min(5000, Math.floor(150 + Math.max(0, Math.log10(currentF.zoom)) * 100));
        
        gl.bindFramebuffer(gl.FRAMEBUFFER, accumFbo);
        gl.viewport(0, 0, w, h);
        if (frameCount <= 1) {
            gl.disable(gl.BLEND);
        } else {
            gl.enable(gl.BLEND);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        }
        drawShader(currentF, alpha, jx, jy, iterLimit);
        
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, w, h);
        gl.disable(gl.BLEND);
        gl.useProgram(displayProg);
        gl.bindVertexArray(vao);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, accumTex);
        gl.uniform1i(dispTexLoc, 0);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        
        if(frameCount % 10 === 0 || isMoving) {
            statsDisplay.innerText = `ZOOM: ${currentF.zoom.toExponential()}x | SAMPLES: ${frameCount} | LIMIT: ${iterLimit}`;
        }
    } else {
        statsDisplay.innerText = "";
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.disable(gl.BLEND);
        gl.clearColor(0,0,0,1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        let hw = Math.floor(w/2), hh = Math.floor(h/2);
        gl.viewport(0, hh, hw, h - hh); drawShader(gridF[0], 1.0, 0, 0, 150);
        gl.viewport(hw, hh, w - hw, h - hh); drawShader(gridF[1], 1.0, 0, 0, 150);
        gl.viewport(0, 0, hw, hh); drawShader(gridF[2], 1.0, 0, 0, 150);
        gl.viewport(hw, 0, w - hw, hh); drawShader(gridF[3], 1.0, 0, 0, 150);
    }
    requestAnimationFrame(renderLoop);
}
renderLoop();
</script>
