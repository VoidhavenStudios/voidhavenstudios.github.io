<script>
const workerCode = `
const SCALE_BITS = 120n;
const SCALE = 1n << SCALE_BITS;

function bc_add(a, b) { return [a[0]+b[0], a[1]+b[1]]; }
function bc_sub(a, b) { return [a[0]-b[0], a[1]-b[1]]; }
function bc_mul(a, b) { return [(a[0]*b[0] - a[1]*b[1]) >> SCALE_BITS, (a[0]*b[1] + a[1]*b[0]) >> SCALE_BITS]; }
function bc_sqr(a) { return [(a[0]*a[0] - a[1]*a[1]) >> SCALE_BITS, (2n * a[0] * a[1]) >> SCALE_BITS]; }
function bc_cube(a) { return bc_mul(bc_sqr(a), a); }
function bc_abs2(a) { return (a[0]*a[0] + a[1]*a[1]) >> SCALE_BITS; }

function genASTWorker(ast) {
    let id = 0; let code = '';
    function tr(n) {
        let myId = id++;
        if(n.type === 'var') { code += n.val === 'z' ? \`let v_\${myId} = Z;\\n\` : \`let v_\${myId} = C;\\n\`; }
        else if(n.type === 'c_sqr') { let a = tr(n.arg); code += \`let v_\${myId} = bc_sqr(v_\${a});\\n\`; }
        else if(n.type === 'c_cube') { let a = tr(n.arg); code += \`let v_\${myId} = bc_cube(v_\${a});\\n\`; }
        else if(n.type === 'c_add') { let a = tr(n.left), b = tr(n.right); code += \`let v_\${myId} = bc_add(v_\${a}, v_\${b});\\n\`; }
        else if(n.type === 'c_sub') { let a = tr(n.left), b = tr(n.right); code += \`let v_\${myId} = bc_sub(v_\${a}, v_\${b});\\n\`; }
        else if(n.type === 'c_mul') { let a = tr(n.left), b = tr(n.right); code += \`let v_\${myId} = bc_mul(v_\${a}, v_\${b});\\n\`; }
        return myId;
    }
    let r = tr(ast); code += \`return v_\${r};\\n\`;
    return new Function('Z', 'C', 'bc_add', 'bc_sub', 'bc_mul', 'bc_sqr', 'bc_cube', code);
}

function probeFitness(ast) {
    let code = ''; let id = 0;
    function tr(n) {
        let myId = id++;
        if(n.type === 'var') code += n.val === 'z' ? \`let v_\${myId} = Z;\\n\` : \`let v_\${myId} = C;\\n\`;
        else if(n.type === 'c_sqr') { let a = tr(n.arg); code += \`let v_\${myId} = [v_\${a}[0]*v_\${a}[0]-v_\${a}[1]*v_\${a}[1], 2.0*v_\${a}[0]*v_\${a}[1]];\\n\`; }
        else if(n.type === 'c_cube') { let a = tr(n.arg); code += \`let v_\${myId} = [v_\${a}[0]*(v_\${a}[0]*v_\${a}[0]-3.0*v_\${a}[1]*v_\${a}[1]), v_\${a}[1]*(3.0*v_\${a}[0]*v_\${a}[0]-v_\${a}[1]*v_\${a}[1])];\\n\`; }
        else if(n.type === 'c_add') { let a = tr(n.left), b = tr(n.right); code += \`let v_\${myId} = [v_\${a}[0]+v_\${b}[0], v_\${a}[1]+v_\${b}[1]];\\n\`; }
        else if(n.type === 'c_sub') { let a = tr(n.left), b = tr(n.right); code += \`let v_\${myId} = [v_\${a}[0]-v_\${b}[0], v_\${a}[1]-v_\${b}[1]];\\n\`; }
        else if(n.type === 'c_mul') { let a = tr(n.left), b = tr(n.right); code += \`let v_\${myId} = [v_\${a}[0]*v_\${b}[0]-v_\${a}[1]*v_\${b}[1], v_\${a}[0]*v_\${b}[1]+v_\${a}[1]*v_\${b}[0]];\\n\`; }
        return myId;
    }
    let r = tr(ast); code += \`return v_\${r};\\n\`;
    let evalFloat = new Function('Z', 'C', code);
    
    let esc = 0, sol = 0;
    for(let y=0; y<16; y++) {
        for(let x=0; x<16; x++) {
            let Z = [0,0], C = [(x/15)*4-2, (y/15)*4-2], i=0;
            for(; i<100; i++) {
                Z = evalFloat(Z, C);
                if(Z[0]*Z[0] + Z[1]*Z[1] > 256) break;
            }
            if(i < 2) esc++;
            if(i === 100) sol++;
        }
    }
    return (esc < 240 && sol < 240);
}

const vars = ['z', 'c'];
const op1 = ['c_sqr', 'c_cube'];
const op2 = ['c_add', 'c_sub', 'c_mul'];

function buildNode(depth) {
    if(depth <= 0 || Math.random() < 0.2) return { type: 'var', val: vars[Math.floor(Math.random()*vars.length)] };
    if(Math.random() < 0.4) return { type: op1[Math.floor(Math.random()*op1.length)], arg: buildNode(depth - 1) };
    return { type: op2[Math.floor(Math.random()*op2.length)], left: buildNode(depth - 1), right: buildNode(depth - 1) };
}

function clone(n) {
    if(n.type === 'var') return { ...n };
    if(op1.includes(n.type)) return { ...n, arg: clone(n.arg) };
    return { ...n, left: clone(n.left), right: clone(n.right) };
}

function mutate(n, depth) {
    if(Math.random() < 0.2 || depth <= 0) return buildNode(2);
    let c = clone(n);
    if(op1.includes(c.type)) c.arg = mutate(c.arg, depth - 1);
    else { if(Math.random() < 0.5) c.left = mutate(c.left, depth - 1); else c.right = mutate(c.right, depth - 1); }
    return c;
}

onmessage = function(e) {
    if(e.data.cmd === 'EVOLVE' || e.data.cmd === 'RANDOM' || e.data.cmd === 'DNA') {
        let asts = [];
        for(let i=0; i<4; i++) {
            let ast; let valid = false; let tries = 0;
            while(!valid && tries < 50) {
                if(e.data.cmd === 'RANDOM') ast = { type: 'c_add', left: buildNode(3), right: { type: 'var', val: 'c' } };
                else if(e.data.cmd === 'DNA') ast = e.data.asts[i];
                else ast = mutate(e.data.baseAst, 2);
                valid = probeFitness(ast);
                tries++;
            }
            if(!valid) ast = { type: 'c_add', left: { type: 'c_sqr', arg: { type: 'var', val: 'z' } }, right: { type: 'var', val: 'c' } };
            asts.push(ast);
        }
        postMessage({ cmd: 'AST_READY', asts });
    } else if(e.data.cmd === 'CALC_REF') {
        let f = genASTWorker(e.data.ast);
        let C = [BigInt(e.data.cx), BigInt(e.data.cy)];
        let Z = [0n, 0n];
        let orbit = new Float32Array(e.data.iter * 2);
        
        // Correct scaling for bc_abs2!
        let maxR2 = 256n << SCALE_BITS;
        const scale_num = Math.pow(2, 120);
        
        for(let i=0; i<e.data.iter; i++) {
            orbit[i*2] = Number(Z[0]) / scale_num;
            orbit[i*2+1] = Number(Z[1]) / scale_num;
            if(bc_abs2(Z) > maxR2) break;
            Z = f(Z, C, bc_add, bc_sub, bc_mul, bc_sqr, bc_cube);
        }
        postMessage({ cmd: 'REF_READY', orbit, idx: e.data.idx, reqCx: e.data.cx, reqCy: e.data.cy }, [orbit.buffer]);
    }
};
`;

let accumTex = gl.createTexture(), accumFbo = gl.createFramebuffer();

let currentJx = 0.0, currentJy = 0.0, currentAlpha = 1.0;

let worker = new Worker(URL.createObjectURL(new Blob([workerCode], {type: 'application/javascript'})));

let mode = 'FULL'; 
let currentAst = { type: 'c_add', left: { type: 'c_sqr', arg: { type: 'var', val: 'z' } }, right: { type: 'var', val: 'c' } };
let gridAsts = [];
let fullProg = null, gridProgs = [null, null, null, null];
let isEvolving = false, isCompiling = false, isComputingRef = false;
let pendingProgs = [];

let zoom = 1.0;
let centerVirt = [0n, 0n], centerRef = [0n, 0n];
let refOrbitTex = [gl.createTexture(), gl.createTexture(), gl.createTexture(), gl.createTexture()];
for(let i=0; i<4; i++) {

}

}
window.addEventListener('resize', resize);
resize();

function compileGLSL(ast) {
    let id = 0, code = '';
    function tr(n) {
        let myId = id++;
        if(n.type === 'var') {
            if(n.val === 'z') code += `vec2 r_${myId}=Xn; vec2 d_${myId}=z_in; vec2 dz_${myId}=dz_in;\n`;
            else code += `vec2 r_${myId}=u_center; vec2 d_${myId}=c; vec2 dz_${myId}=vec2(1.0,0.0);\n`;
        } else if(n.type === 'c_sqr') {
            let a = tr(n.arg);
            code += `vec2 r_${myId}=c_sqr(r_${a}); vec2 d_${myId}=2.0*c_mul(r_${a},d_${a})+c_sqr(d_${a}); vec2 dz_${myId}=2.0*c_mul(r_${a}+d_${a},dz_${a});\n`;
        } else if(n.type === 'c_cube') {
            let a = tr(n.arg);
            code += `vec2 r_${myId}=c_cube(r_${a}); vec2 aF_${myId}=r_${a}+d_${a}; vec2 d_${myId}=3.0*c_mul(c_sqr(r_${a}),d_${a})+3.0*c_mul(r_${a},c_sqr(d_${a}))+c_cube(d_${a}); vec2 dz_${myId}=3.0*c_mul(c_sqr(aF_${myId}),dz_${a});\n`;
        } else if(n.type === 'c_add') {
            let a = tr(n.left), b = tr(n.right);
            code += `vec2 r_${myId}=r_${a}+r_${b}; vec2 d_${myId}=d_${a}+d_${b}; vec2 dz_${myId}=dz_${a}+dz_${b};\n`;
        } else if(n.type === 'c_sub') {
            let a = tr(n.left), b = tr(n.right);
            code += `vec2 r_${myId}=r_${a}-r_${b}; vec2 d_${myId}=d_${a}-d_${b}; vec2 dz_${myId}=dz_${a}-dz_${b};\n`;
        } else if(n.type === 'c_mul') {
            let a = tr(n.left), b = tr(n.right);
            code += `vec2 r_${myId}=c_mul(r_${a},r_${b}); vec2 d_${myId}=c_mul(r_${a},d_${b})+c_mul(r_${b},d_${a})+c_mul(d_${a},d_${b}); vec2 dz_${myId}=c_mul(r_${a}+d_${a},dz_${b})+c_mul(r_${b}+d_${b},dz_${a});\n`;
        }
        return myId;
    }
    let r = tr(ast);
    code += `out_z = d_${r}; out_dz = dz_${r}; out_full = r_${r} + d_${r};\n`;
    return code;
}

const vsSource = `#version 300 es
in vec2 position; out vec2 vUv;
void main() { vUv = position * 0.5 + 0.5; gl_Position = vec4(position, 0.0, 1.0); }`;

const fsTemplate = `#version 300 es
precision highp float; precision highp int;
in vec2 vUv; out vec4 fragColor;

uniform sampler2D u_ref_tex;
uniform vec2 u_res;
uniform vec2 u_center;
uniform vec2 u_dc_offset;
uniform float u_span;
uniform int u_iter;
uniform vec3 u_color;
uniform vec2 u_jitter;
uniform float u_alpha;

vec2 c_mul(vec2 a, vec2 b) { return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x); }
vec2 c_sqr(vec2 a) { return vec2(a.x*a.x - a.y*a.y, 2.0*a.x*a.y); }
vec2 c_cube(vec2 a) { return c_mul(c_sqr(a), a); }

void evalAST(vec2 Xn, vec2 z_in, vec2 c, vec2 dz_in, out vec2 out_z, out vec2 out_dz, out vec2 out_full) {
    _MATH_
}

void main() {
    vec2 dc = (vUv - 0.5 + u_jitter / u_res) * u_span * vec2(u_res.x/u_res.y, 1.0) + u_dc_offset;
    vec2 z = vec2(0.0), c = dc, dz = vec2(0.0), z_full = vec2(0.0);
    int count = 0; float r2 = 0.0;
    
    for(int i = 0; i < 300; i++) {
        for(int j = 0; j < 100; j++) {
            if(count >= u_iter) break;
            ivec2 t_uv = ivec2(count % 256, count / 256);
            vec2 Xn = texelFetch(u_ref_tex, t_uv, 0).xy;
            
            // Temporary block variables to prevent in/out GLSL aliasing failure
            vec2 nz, ndz;
            evalAST(Xn, z, c, dz, nz, ndz, z_full);
            z = nz; dz = ndz;
            
            r2 = dot(z_full, z_full);
            if(r2 > 256.0) break;
            count++;
        }
        if(r2 > 256.0 || count >= u_iter) break;
    }
    
    if(!(r2 > 256.0)) { fragColor = vec4(0.0, 0.0, 0.0, u_alpha); return; }
    
    float r = sqrt(r2);
    float dr = length(dz);
    float de = 0.5 * r * log(r) / (dr + 1e-15);
    float de_px = de * u_res.y / u_span;
    float edge = clamp(1.2 - de_px, 0.0, 1.0);
    float sn = float(count) - log2(max(log2(max(r2, 256.0))/2.0, 1e-8)) + 4.0;
    vec3 col = 0.5 + 0.5 * cos(3.0 + sn * 0.15 + u_color);
    fragColor = vec4(col * (edge + 0.6 * exp(-de_px * 0.08)), u_alpha);
}`;

function buildProgram(ast) {
    let p = gl.createProgram();
    let vs = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(vs, vsSource); gl.compileShader(vs);
    let fs = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(fs, fsTemplate.replace('_MATH_', compileGLSL(ast))); gl.compileShader(fs);
    gl.attachShader(p, vs); gl.attachShader(p, fs); gl.bindAttribLocation(p, 0, 'position'); gl.linkProgram(p);
    return { prog: p, col: [Math.random()*6, Math.random()*6, Math.random()*6], locs: {} };
}

function extractLocations(p) {
    if(!p.prog) return;
    p.locs = {
        res: gl.getUniformLocation(p.prog, 'u_res'), center: gl.getUniformLocation(p.prog, 'u_center'),
        dc_off: gl.getUniformLocation(p.prog, 'u_dc_offset'), span: gl.getUniformLocation(p.prog, 'u_span'),
        iter: gl.getUniformLocation(p.prog, 'u_iter'), col: gl.getUniformLocation(p.prog, 'u_color'),
        jit: gl.getUniformLocation(p.prog, 'u_jitter'), alpha: gl.getUniformLocation(p.prog, 'u_alpha'),
        ref: gl.getUniformLocation(p.prog, 'u_ref_tex')
    };
}

const vao = gl.createVertexArray(); gl.bindVertexArray(vao);
const qbuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, qbuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

const hudFs = `#version 300 es
precision highp float; precision highp int;
in vec2 vUv; out vec4 fragColor;
uniform sampler2D u_tex;
uniform vec2 u_res;
uniform int u_txt1[64]; uniform int u_len1;
uniform int u_txt2[64]; uniform int u_len2;
uniform vec4 u_btns[4]; uniform int u_hvr[4];
uniform int u_txt_btn[24]; uniform int u_b_lens[4];

uint font[59] = uint[59](
    0u, 9346u, 24576u, 31725u, 14827u, 21845u, 15663u, 8192u, 10530u, 8770u, 2728u, 5504u, 2u, 448u, 2u, 4368u,
    31599u, 9362u, 29671u, 29391u, 23497u, 31183u, 31215u, 29257u, 31727u, 31695u,
    1040u, 1042u, 5904u, 3640u, 17424u, 10608u, 31725u,
    31725u, 14827u, 15663u, 14815u, 31143u, 31140u, 15855u, 23533u, 29847u, 9455u, 23465u, 18735u, 23277u, 23501u, 31599u, 31716u, 31603u, 31721u, 31183u, 29842u, 23535u, 23402u, 23533u, 23469u, 23466u, 29671u
);

float sdBox(vec2 p, vec2 b) { vec2 d = abs(p) - b; return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0); }

float textSDF(vec2 p, vec2 pos, float scale, int txt[64], int len) {
    vec2 up = (p - pos) / scale;
    if(up.x < 0.0 || up.y < 0.0 || up.y > 1.0 || up.x > float(len)) return 1.0;
    int idx = int(up.x); int ascii = txt[idx];
    if(ascii < 32 || ascii > 90) return 1.0;
    uint chr = font[ascii - 32];
    vec2 fuv = vec2(fract(up.x), up.y);
    fuv = (fuv - 0.1) * 1.25;
    if(fuv.x < 0.0 || fuv.x > 1.0 || fuv.y < 0.0 || fuv.y > 1.0) return 1.0;
    ivec2 iuv = ivec2(fuv * vec2(3.0, 5.0));
    int bit = (4 - iuv.y) * 3 + iuv.x;
    if(((chr >> uint(bit)) & 1u) == 0u) return 1.0;
    vec2 cp = (vec2(iuv) + 0.5) / vec2(3.0, 5.0);
    return length(fuv - cp) - 0.15;
}

void main() {
    vec4 bg = texture(u_tex, vUv);
    vec2 p = gl_FragCoord.xy;
    vec3 ui = vec3(0.0); float uiAlpha = 0.0;
    
    float t1 = textSDF(p, vec2(20.0, u_res.y - 30.0), 16.0, u_txt1, u_len1);
    if(t1 < 0.0) { ui = mix(ui, vec3(0.0, 1.0, 0.6), clamp(-t1*10.0, 0.0, 1.0)); uiAlpha = max(uiAlpha, clamp(-t1*10.0, 0.0, 1.0)); }
    
    float t2 = textSDF(p, vec2(20.0, u_res.y - 50.0), 12.0, u_txt2, u_len2);
    if(t2 < 0.0) { ui = mix(ui, vec3(0.0, 1.0, 1.0), clamp(-t2*10.0, 0.0, 1.0)); uiAlpha = max(uiAlpha, clamp(-t2*10.0, 0.0, 1.0)); }

    int b_off = 0;
    for(int i=0; i<4; i++) {
        vec2 bc = u_btns[i].xy; vec2 bs = u_btns[i].zw;
        float db = sdBox(p - bc, bs) - 4.0;
        if(db < 2.0) {
            float alpha = u_hvr[i] == 1 ? 0.4 : 0.15;
            ui = mix(ui, vec3(0.0, 1.0, 0.6), alpha * clamp(2.0 - abs(db), 0.0, 1.0));
            uiAlpha = max(uiAlpha, alpha);
        }
        int blen = u_b_lens[i];
        int btxt[64]; for(int j=0; j<64; j++) { if(j<blen) btxt[j] = u_txt_btn[b_off+j]; else btxt[j]=32; }
        float tb = textSDF(p, bc - vec2(float(blen)*6.0, 6.0), 12.0, btxt, blen);
        if(tb < 0.0) { ui = mix(ui, vec3(1.0), clamp(-tb*10.0, 0.0, 1.0)); uiAlpha = max(uiAlpha, clamp(-tb*10.0, 0.0, 1.0)); }
        b_off += blen;
    }

    if(u_len2 == -1) {
        float gridLines = min(abs(p.x - u_res.x/2.0), abs(p.y - u_res.y/2.0));
        if(gridLines < 2.0) { ui = vec3(0.0, 1.0, 0.6); uiAlpha = 0.3; }
    }
    
    fragColor = mix(bg, vec4(ui, 1.0), uiAlpha);
}`;

let hudProg = gl.createProgram();
let hVs = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(hVs, vsSource); gl.compileShader(hVs);
let hFs = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(hFs, hudFs); gl.compileShader(hFs);
gl.attachShader(hudProg, hVs); gl.attachShader(hudProg, hFs); gl.linkProgram(hudProg);

const hudLocs = {
    res: gl.getUniformLocation(hudProg, 'u_res'), txt1: gl.getUniformLocation(hudProg, 'u_txt1'), len1: gl.getUniformLocation(hudProg, 'u_len1'),
    txt2: gl.getUniformLocation(hudProg, 'u_txt2'), len2: gl.getUniformLocation(hudProg, 'u_len2'),
    btns: gl.getUniformLocation(hudProg, 'u_btns'), hvr: gl.getUniformLocation(hudProg, 'u_hvr'),
    txt_btn: gl.getUniformLocation(hudProg, 'u_txt_btn'), b_lens: gl.getUniformLocation(hudProg, 'u_b_lens')
};

function astToStr(n) {
    if(n.type === 'var') return n.val.toUpperCase();
    if(n.type === 'c_sqr') return `(${astToStr(n.arg)})^2`;
    if(n.type === 'c_cube') return `(${astToStr(n.arg)})^3`;
    if(n.type === 'c_add') return `(${astToStr(n.left)}+${astToStr(n.right)})`;
    if(n.type === 'c_sub') return `(${astToStr(n.left)}-${astToStr(n.right)})`;
    if(n.type === 'c_mul') return `(${astToStr(n.left)}*${astToStr(n.right)})`;
}

function fillStr(str, arr) { for(let i=0; i<64; i++) arr[i] = i < str.length ? str.charCodeAt(i) : 32; }

let strArr1 = new Int32Array(64), strArr2 = new Int32Array(64);
let btnTxt = new Int32Array(24), btnLens = new Int32Array(4);
let bData = "EVOLVERANDOMDNARES";
for(let i=0; i<18; i++) btnTxt[i] = bData.charCodeAt(i);
btnLens[0]=6; btnLens[1]=6; btnLens[2]=3; btnLens[3]=3;
let btnRects = new Float32Array(16), btnHvr = new Int32Array(4);

function updateUI() {
    let bw = 80, bh = 30, gap = 10, totalW = 4*bw + 3*gap, sx = window.innerWidth/2 - totalW/2;
    for(let i=0; i<4; i++) {
        btnRects[i*4] = (sx + i*(bw+gap) + bw/2) * resScale * window.devicePixelRatio;
        btnRects[i*4+1] = 40 * resScale * window.devicePixelRatio;
        btnRects[i*4+2] = (bw/2) * resScale * window.devicePixelRatio;
        btnRects[i*4+3] = (bh/2) * resScale * window.devicePixelRatio;
    }
}

function kickEvolve(cmd, dna=null) {
    isEvolving = true; needsPreview = true;
    worker.postMessage({ cmd: cmd, baseAst: currentAst, asts: dna });
}
worker.onmessage = function(e) {
    if(e.data.cmd === 'AST_READY') {
        gridAsts = e.data.asts;
        let oldProgs = gridProgs;
        gridProgs = gridAsts.map(buildProgram);
        pendingProgs = [...gridProgs];
        
        oldProgs.forEach(p => { if(p && p !== fullProg) gl.deleteProgram(p.prog); });
        
        isEvolving = false;
        isCompiling = true;
    } else if(e.data.cmd === 'REF_READY') {
        gl.bindTexture(gl.TEXTURE_2D, refOrbitTex[e.data.idx]);
        gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, 256, 256, gl.RG, gl.FLOAT, e.data.orbit);
        isComputingRef = false;
        frameCount = 0; tileIdx = 0; needsPreview = true; lastMoveTime = performance.now();
        // Vital mapping: ensure the Reference mathematically pairs with the coordinates used to calculate it!
        centerRef[0] = BigInt(e.data.reqCx);
        centerRef[1] = BigInt(e.data.reqCy);
    }
};

kickEvolve('RANDOM');

function handleEvolve() { if(mode==='FULL') kickEvolve('EVOLVE'); }
function handleRandom() { if(mode==='FULL') kickEvolve('RANDOM'); }
function handleDNA() {
    if(mode!=='FULL') return;
    let input = prompt("PASTE DNA SEQUENCE OR COPY CURRENT:", btoa(JSON.stringify(currentAst)));
    if(input && input !== btoa(JSON.stringify(currentAst))) {
        try { let ast = JSON.parse(atob(input)); kickEvolve('DNA', [ast, ast, ast, ast]); } catch(e){}
    }
}
function handleRes() { resScale = resScale === 1.0 ? 0.5 : (resScale === 0.5 ? 0.25 : 1.0); resize(); updateUI(); }

let mouseX = 0, mouseY = 0, isDown = false, lastP = null;
window.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    let sx = window.innerWidth/2 - 175;
    for(let i=0; i<4; i++) btnHvr[i] = (mouseY > window.innerHeight-55 && mouseY < window.innerHeight-25 && mouseX > sx + i*90 && mouseX < sx + i*90 + 80) ? 1 : 0;
    if(isDown && mode === 'FULL' && !btnHvr.includes(1)) {
        let dx = mouseX - lastP.x, dy = mouseY - lastP.y;
        let span = 4.0 / zoom;
        let deltaX = (-dx / window.innerWidth) * span * (w/h);
        let deltaY = (dy / window.innerHeight) * span;
        centerVirt[0] += BigInt(Math.floor(deltaX * 2**50)) << 70n;
        centerVirt[1] += BigInt(Math.floor(deltaY * 2**50)) << 70n;
        lastP = { x: mouseX, y: mouseY };
        frameCount = 0; tileIdx = 0; isMoving = true; needsPreview = true; lastMoveTime = performance.now();
    }
});
window.addEventListener('mousedown', e => {
    isDown = true; lastP = { x: mouseX, y: mouseY };
    if(btnHvr[0]) handleEvolve(); else if(btnHvr[1]) handleRandom(); else if(btnHvr[2]) handleDNA(); else if(btnHvr[3]) handleRes();
    else if(mode === 'GRID' && !isCompiling && !isEvolving) {
        let idx = (mouseX > window.innerWidth/2 ? 1 : 0) + (mouseY > window.innerHeight/2 ? 2 : 0);
        fullProg = gridProgs[idx]; currentAst = gridAsts[idx];
        zoom = 1.0; centerVirt = [0n, 0n]; centerRef = [0n, 0n]; mode = 'FULL';
        frameCount = 0; tileIdx = 0; needsPreview = true; lastMoveTime = performance.now();
    }
});
window.addEventListener('mouseup', () => { isDown = false; isMoving = false; });
window.addEventListener('wheel', e => {
    if(mode !== 'FULL' || isCompiling || isEvolving) return;
    zoom *= Math.pow(0.998, e.deltaY);
    frameCount = 0; tileIdx = 0; isMoving = true; needsPreview = true; lastMoveTime = performance.now();
    clearTimeout(window.wheelTimeout);
    window.wheelTimeout = setTimeout(() => { isMoving = false; }, 200);
});

window.addEventListener('touchstart', e => {
    mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
    let sx = window.innerWidth/2 - 175;
    for(let i=0; i<4; i++) btnHvr[i] = (mouseY > window.innerHeight-55 && mouseY < window.innerHeight-25 && mouseX > sx + i*90 && mouseX < sx + i*90 + 80) ? 1 : 0;
    isDown = true; lastP = { x: mouseX, y: mouseY };
}, {passive: false});
window.addEventListener('touchmove', e => {
    if(!isDown || btnHvr.includes(1) || mode !== 'FULL') return;
    let nx = e.touches[0].clientX, ny = e.touches[0].clientY;
    let dx = nx - lastP.x, dy = ny - lastP.y;
    let span = 4.0 / zoom;
    centerVirt[0] += BigInt(Math.floor((-dx / window.innerWidth) * span * (w/h) * 2**50)) << 70n;
    centerVirt[1] += BigInt(Math.floor((dy / window.innerHeight) * span * 2**50)) << 70n;
    lastP = { x: nx, y: ny };
    frameCount = 0; tileIdx = 0; isMoving = true; needsPreview = true; lastMoveTime = performance.now();
}, {passive: false});
window.addEventListener('touchend', e => {
    isDown = false; isMoving = false;
    if(btnHvr[0]) handleEvolve(); else if(btnHvr[1]) handleRandom(); else if(btnHvr[2]) handleDNA(); else if(btnHvr[3]) handleRes();
    else if(mode === 'GRID' && !isCompiling && !isEvolving) {
        let idx = (mouseX > window.innerWidth/2 ? 1 : 0) + (mouseY > window.innerHeight/2 ? 2 : 0);
        fullProg = gridProgs[idx]; currentAst = gridAsts[idx];
        zoom = 1.0; centerVirt = [0n, 0n]; centerRef = [0n, 0n]; mode = 'FULL';
        frameCount = 0; tileIdx = 0; needsPreview = true; lastMoveTime = performance.now();
    }
});

function reqOrbit(ast, idx) {
    if(isComputingRef) return;
    isComputingRef = true;
    worker.postMessage({ cmd: 'CALC_REF', ast, cx: centerVirt[0].toString(), cy: centerVirt[1].toString(), iter: 65536, idx });
}

function renderShader(p, view, alpha, jx, jy, maxIter, span, dcX, dcY, refIdx) {
    if(!p || !p.prog) return;
    gl.viewport(view[0], view[1], view[2], view[3]);
    gl.useProgram(p.prog); gl.bindVertexArray(vao);
    gl.uniform2f(p.locs.res, view[2], view[3]);
    gl.uniform2f(p.locs.center, Number(centerRef[0] >> 60n) / 2**60, Number(centerRef[1] >> 60n) / 2**60);
    gl.uniform2f(p.locs.dc_off, dcX, dcY);
    gl.uniform1f(p.locs.span, span);
    gl.uniform1i(p.locs.iter, maxIter);
    gl.uniform3f(p.locs.col, p.col[0], p.col[1], p.col[2]);
    gl.uniform2f(p.locs.jit, jx, jy);
    gl.uniform1f(p.locs.alpha, alpha);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, refOrbitTex[refIdx]); gl.uniform1i(p.locs.ref, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function loop() {
    updateUI();
    
    // Check parallel extension purely without evaluating before AST response
    if(isCompiling && pendingProgs.length > 0) {
        let done = true;
        if(extParallel) done = pendingProgs.every(p => gl.getProgramParameter(p.prog, extParallel.COMPLETION_STATUS_KHR));
        if(done) { 
            pendingProgs.forEach(extractLocations);
            isCompiling = false; 
            mode = 'GRID'; 
            frameCount = 0; tileIdx = 0; zoom = 1.0; centerVirt = [0n, 0n]; centerRef = [0n, 0n]; 
            pendingProgs = [];
            clearOrbits(); // Flush reference orbits so grid preview renders using root coordinate
        }
    }
    
    if(mode === 'FULL' && !isMoving && !isComputingRef && (centerVirt[0] !== centerRef[0] || centerVirt[1] !== centerRef[1])) reqOrbit(currentAst, 0);

    let iter = Math.min(65500, Math.floor(150 + Math.max(0, Math.log10(zoom)) * 300));
    let span = 4.0 / zoom;
    let dcX = Number(centerVirt[0] - centerRef[0]) / 2**120;
    let dcY = Number(centerVirt[1] - centerRef[1]) / 2**120;

    gl.bindFramebuffer(gl.FRAMEBUFFER, accumFbo);
    if(frameCount === 0) { gl.disable(gl.BLEND); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT); }
    else { gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA); }

    if(mode === 'FULL' && fullProg) {
        if(isMoving || isCompiling || isEvolving || isComputingRef) {
            gl.disable(gl.SCISSOR_TEST);
            renderShader(fullProg, [0, 0, w, h], 1.0, 0, 0, 200, span, dcX, dcY, 0);
            needsPreview = false; lastMoveTime = performance.now();
        } else if(performance.now() - lastMoveTime > 200) {
            gl.enable(gl.SCISSOR_TEST);
            let tw = Math.ceil(w / gridTilesX), th = Math.ceil(h / gridTilesY);
            let tx = (tileIdx % gridTilesX) * tw, ty = Math.floor(tileIdx / gridTilesX) * th;
            gl.scissor(tx, ty, tw, th);
            let alpha = frameCount === 0 ? 1.0 : 1.0 / (frameCount + 1);
            let jx = frameCount > 0 ? (Math.random()-0.5)*1.5 : 0;
            let jy = frameCount > 0 ? (Math.random()-0.5)*1.5 : 0;
            renderShader(fullProg, [0, 0, w, h], alpha, jx, jy, iter, span, dcX, dcY, 0);
            gl.disable(gl.SCISSOR_TEST);
            tileIdx++; if(tileIdx >= gridTilesX * gridTilesY) { tileIdx = 0; frameCount++; }
        }
    } else if(mode === 'GRID' && !isCompiling && !isEvolving && gridProgs[0]) {
        gl.disable(gl.SCISSOR_TEST); gl.disable(gl.BLEND);
        let hw = Math.floor(w/2), hh = Math.floor(h/2);
        renderShader(gridProgs[0], [0, hh, hw, h-hh], 1.0, 0, 0, 150, 4.0, 0, 0, 0);
        renderShader(gridProgs[1], [hw, hh, w-hw, h-hh], 1.0, 0, 0, 150, 4.0, 0, 0, 1);
        renderShader(gridProgs[2], [0, 0, hw, hh], 1.0, 0, 0, 150, 4.0, 0, 0, 2);
        renderShader(gridProgs[3], [hw, 0, w-hw, hh], 1.0, 0, 0, 150, 4.0, 0, 0, 3);
    }

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, w, h); gl.disable(gl.BLEND);
    gl.useProgram(hudProg); gl.bindVertexArray(vao);
    gl.uniform2f(hudLocs.res, w, h);
    gl.uniform4fv(hudLocs.btns, btnRects); gl.uniform1iv(hudLocs.hvr, btnHvr);
    gl.uniform1iv(hudLocs.txt_btn, btnTxt); gl.uniform1iv(hudLocs.b_lens, btnLens);
    
    let astStr = "Z = " + astToStr(currentAst);
    if(astStr.length > 61) astStr = astStr.substring(0, 61) + "...";
    
    let fStr = isEvolving ? "EVOLVING MUTATIONS..." : (isCompiling ? "COMPILING SHADERS..." : (isComputingRef ? "CALCULATING ORBIT..." : astStr));
    fillStr(fStr, strArr1); gl.uniform1iv(hudLocs.txt1, strArr1); gl.uniform1i(hudLocs.len1, Math.min(fStr.length, 64));
    
    let sStr = mode === 'FULL' ? `ZOOM: 1e${Math.max(0, Math.log10(zoom)).toFixed(1)} | DE LIMIT: ${iter} | SAMPLES: ${isMoving ? 0 : frameCount}` : "";
    fillStr(sStr, strArr2); gl.uniform1iv(hudLocs.txt2, strArr2); gl.uniform1i(hudLocs.len2, mode==='FULL' ? Math.min(sStr.length, 64) : -1);
    
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, accumTex);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
