<!DOCTYPE html><html><head><style>body{margin:0;overflow:hidden;background:#000}canvas{position:absolute}</style></head><body><canvas id="c"></canvas><script>const c=document.getElementById("c"),cx=c.getContext("2d");let W,H,L;function R(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;L=Math.min(W,H)/5;}window.onresize=R;const N=2,G=9.81,dt=0.015,num=10000;R();const st=new Float64Array(num*4),k1=new Float64Array(4),k2=new Float64Array(4),k3=new Float64Array(4),k4=new Float64Array(4),tm=new Float64Array(4);for(let p=0;p<num;p++){st[p*4]=Math.PI/2+p*1e-5;st[p*4+1]=Math.PI/2;}function f(o,s,d){let t0=s[o],t1=s[o+1],w0=s[o+2],w1=s[o+3],dth=t0-t1,co=Math.cos(dth),sn=Math.sin(dth);d[0]=w0;d[1]=w1;let b0=-w1*w1*sn-2*G*Math.sin(t0),b1=w0*w0*sn-G*Math.sin(t1),det=2-co*co;d[2]=(b0-co*b1)/det;d[3]=(2*b1-co*b0)/det;}const B=250;cx.lineWidth=1;function Z(){cx.clearRect(0,0,W,H);for(let p=0;p<num;p++){let o=p*4;f(o,st,k1);for(let i=0;i<4;i++)tm[i]=st[o+i]+0.5*dt*k1[i];f(0,tm,k2);for(let i=0;i<4;i++)tm[i]=st[o+i]+0.5*dt*k2[i];f(0,tm,k3);for(let i=0;i<4;i++)tm[i]=st[o+i]+dt*k3[i];f(0,tm,k4);for(let i=0;i<4;i++)st[o+i]+=(dt/6)*(k1[i]+2*k2[i]+2*k3[i]+k4[i]);}for(let bn=0;bn<B;bn++){cx.beginPath();cx.strokeStyle=`hsl(${(bn/B)*270},100%,50%)`;let s=Math.floor(bn*num/B),e=Math.floor((bn+1)*num/B);for(let p=s;p<e;p++){let o=p*4,x=W/2,y=H/3;cx.moveTo(x,y);for(let i=0;i<N;i++){x+=L*Math.sin(st[o+i]);y+=L*Math.cos(st[o+i]);cx.lineTo(x,y);}}cx.stroke();}requestAnimationFrame(Z);}Z();</script></body></html>
