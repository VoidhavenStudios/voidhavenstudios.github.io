<!DOCTYPE html><html><head><style>body{margin:0;overflow:hidden;background:#000}canvas{position:absolute}</style></head><body><canvas id="t"></canvas><canvas id="c"></canvas><script>const t=document.getElementById("t"),c=document.getElementById("c"),tx=t.getContext("2d"),cx=c.getContext("2d");let W,H,L;function R(){W=t.width=c.width=window.innerWidth;H=t.height=c.height=window.innerHeight;L=Math.min(W,H)/7.5;}window.onresize=R;const N=3,G=9.81,dt=0.015,num=1;R();const st=new Float64Array(6),k1=new Float64Array(6),k2=new Float64Array(6),k3=new Float64Array(6),k4=new Float64Array(6),tm=new Float64Array(6);for(let i=0;i<3;i++)st[i]=Math.PI;st[0]-=1e-5;function f(o,s,d){let t0=s[o],t1=s[o+1],t2=s[o+2],w0=s[o+3],w1=s[o+4],w2=s[o+5];d[0]=w0;d[1]=w1;d[2]=w2;let c01=Math.cos(t0-t1),c02=Math.cos(t0-t2),c12=Math.cos(t1-t2),s01=Math.sin(t0-t1),s02=Math.sin(t0-t2),s12=Math.sin(t1-t2);let b0=-2*w1*w1*s01-w2*w2*s02-3*G*Math.sin(t0),b1=2*w0*w0*s01-w2*w2*s12-2*G*Math.sin(t1),b2=w0*w0*s02+w1*w1*s12-G*Math.sin(t2);let D=3*(2-c12*c12)-2*c01*(2*c01-c12*c02)+c02*(2*c01*c12-2*c02);d[3]=(b0*(2-c12*c12)-2*c01*(b1-c12*b2)+c02*(b1*c12-2*b2))/D;d[4]=(3*(b1-c12*b2)-b0*(2*c01-c12*c02)+c02*(2*c01*b2-b1*c02))/D;d[5]=(3*(2*b2-b1*c12)-2*c01*(2*c01*b2-b1*c02)+b0*(2*c01*c12-2*c02))/D;}tx.strokeStyle="rgba(255,255,255,0.7)";tx.lineWidth=2;let px=0,py=0;function Z(){cx.clearRect(0,0,W,H);f(0,st,k1);for(let i=0;i<6;i++)tm[i]=st[i]+0.5*dt*k1[i];f(0,tm,k2);for(let i=0;i<6;i++)tm[i]=st[i]+0.5*dt*k2[i];f(0,tm,k3);for(let i=0;i<6;i++)tm[i]=st[i]+dt*k3[i];f(0,tm,k4);for(let i=0;i<6;i++)st[i]+=(dt/6)*(k1[i]+2*k2[i]+2*k3[i]+k4[i]);cx.strokeStyle="#fff";cx.lineWidth=3;let x=W/2,y=H/2;cx.beginPath();cx.moveTo(x,y);for(let i=0;i<N;i++){x+=L*Math.sin(st[i]);y+=L*Math.cos(st[i]);cx.lineTo(x,y);}cx.stroke();if(px){tx.beginPath();tx.moveTo(px,py);tx.lineTo(x,y);tx.stroke();}px=x;py=y;requestAnimationFrame(Z);}Z();</script></body></html>
