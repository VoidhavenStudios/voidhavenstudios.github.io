<!DOCTYPE html><html><head><style>body{margin:0;overflow:hidden;background:#000}canvas{position:absolute}</style></head><body><canvas id="t"></canvas><canvas id="c"></canvas><script>const t=document.getElementById("t"),c=document.getElementById("c"),tx=t.getContext("2d"),cx=c.getContext("2d");let W,H,L;function R(){W=t.width=c.width=window.innerWidth;H=t.height=c.height=window.innerHeight;L=Math.min(W,H)/5;}window.onresize=R;const N=2,G=9.81,dt=0.015,num=1;R();const st=new Float64Array(4),k1=new Float64Array(4),k2=new Float64Array(4),k3=new Float64Array(4),k4=new Float64Array(4),tm=new Float64Array(4);st[0]=Math.PI-1e-5;st[1]=Math.PI;function f(o,s,d){let t0=s[o],t1=s[o+1],w0=s[o+2],w1=s[o+3],dth=t0-t1,co=Math.cos(dth),sn=Math.sin(dth);d[0]=w0;d[1]=w1;let b0=-w1*w1*sn-2*G*Math.sin(t0),b1=w0*w0*sn-G*Math.sin(t1),det=2-co*co;d[2]=(b0-co*b1)/det;d[3]=(2*b1-co*b0)/det;}tx.strokeStyle="rgba(255,255,255,0.7)";tx.lineWidth=2;let px=0,py=0;function Z(){cx.clearRect(0,0,W,H);f(0,st,k1);for(let i=0;i<4;i++)tm[i]=st[i]+0.5*dt*k1[i];f(0,tm,k2);for(let i=0;i<4;i++)tm[i]=st[i]+0.5*dt*k2[i];f(0,tm,k3);for(let i=0;i<4;i++)tm[i]=st[i]+dt*k3[i];f(0,tm,k4);for(let i=0;i<4;i++)st[i]+=(dt/6)*(k1[i]+2*k2[i]+2*k3[i]+k4[i]);cx.strokeStyle="#fff";cx.lineWidth=3;let x=W/2,y=H/2;cx.beginPath();cx.moveTo(x,y);for(let i=0;i<N;i++){x+=L*Math.sin(st[i]);y+=L*Math.cos(st[i]);cx.lineTo(x,y);}cx.stroke();if(px){tx.beginPath();tx.moveTo(px,py);tx.lineTo(x,y);tx.stroke();}px=x;py=y;requestAnimationFrame(Z);}Z();</script></body></html>
